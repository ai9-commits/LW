<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>時間加算ツール</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="header"></div>
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => document.getElementById("header").innerHTML = data);
</script>

<main>

<h2>指定分数後の時刻計算</h2>

<div class="form-row">
  <label>回数</label>
  <input type="number" id="input1" min="0" max="99" class="small-input">
</div>

<div class="form-row">
  <label>× 分</label>
  <input type="number" id="input2" value="5" readonly class="small-input">
</div>

<button onclick="calcTime()">計算する</button>

<div class="result">
  <p>現在時刻：<span id="outputNow">-</span></p>
  <p>計算後時刻：<span id="outputFuture">-</span></p>
</div>

</main>

<script>
function formatTime(date){
  const h = String(date.getHours()).padStart(2,'0');
  const m = String(date.getMinutes()).padStart(2,'0');
  const s = String(date.getSeconds()).padStart(2,'0');
  return `${h}:${m}:${s}`;
}

function calcTime(){
  let n = parseInt(document.getElementById("input1").value);
  if(isNaN(n)) n = 0;

  const m = parseInt(document.getElementById("input2").value);

  const now = new Date();
  const future = new Date(now);
  future.setMinutes(now.getMinutes() + n*m);

  document.getElementById("outputNow").textContent = formatTime(now);
  document.getElementById("outputFuture").textContent = formatTime(future);
}
</script>

</body>
</html>
