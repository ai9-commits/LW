<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>簡易複数タイマー</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ヘッダー -->
<div id="header"></div>
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  })
  .catch(err => console.error("ヘッダー読み込み失敗:", err));
</script>

<main>

<h2>簡易複数タイマー</h2>

<!-- 入力エリア -->
<div class="form-row">
  <label>ラベル</label>
  <input type="text" id="memo" placeholder="メモ的に使う欄">
</div>

<div class="form-row">
  <label>時間</label>
  <input
    type="text"
    id="timeInput"
    placeholder="例: 5:30 / 530 / 00:05:30"
    inputmode="numeric"
  >
</div>

<button onclick="addTimer()">追加</button>

<h3>タイマー一覧</h3>
<ul id="timerList"></ul>

<h3>通知</h3>
<div id="notifications"></div>

</main>

<script>
let timerId = 0;

/* =========================
   時間パース
========================= */
function parseTimeFlexible(input) {
  if (!input) return null;

  input = input.trim();

  // コロンあり
  if (input.includes(':')) {
    const parts = input.split(':').map(Number);

    if (parts.length === 3) {
      return parts[0]*3600 + parts[1]*60 + parts[2];
    }
    if (parts.length === 2) {
      return parts[0]*60 + parts[1];
    }
    return null;
  }

  // 数字のみ
  if (!/^\d+$/.test(input)) return null;

  const str = input.padStart(6, '0');

  const h = Number(str.slice(0, -4)) || 0;
  const m = Number(str.slice(-4, -2));
  const s = Number(str.slice(-2));

  if (m >= 60 || s >= 60) return null;

  return h*3600 + m*60 + s;
}

/* =========================
   表示フォーマット
========================= */
function formatTime(totalSeconds) {
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = totalSeconds % 60;

  return String(h).padStart(2,'0') + ":" +
         String(m).padStart(2,'0') + ":" +
         String(s).padStart(2,'0');
}

/* =========================
   入力自動整形
========================= */
const timeInput = document.getElementById("timeInput");

timeInput.addEventListener("blur", () => {
  const sec = parseTimeFlexible(timeInput.value);
  if (sec === null) return;
  timeInput.value = formatTime(sec);
});

/* =========================
   タイマー追加
========================= */
function addTimer() {
  const memo = document.getElementById("memo").value.trim() || "（ラベルなし）";
  const input = document.getElementById("timeInput").value;

  const totalSeconds = parseTimeFlexible(input);

  if (totalSeconds === null || totalSeconds <= 0) {
    alert("時間形式が不正です");
    return;
  }

  const totalMs = totalSeconds * 1000;

  const now = new Date();
  const target = new Date(now.getTime() + totalMs);

  const li = document.createElement("li");
  li.className = "timer-item";
  const id = ++timerId;

  li.innerHTML = `
    タイマー${id}【${memo}】：${formatTime(totalSeconds)} 後 → ${target.toLocaleTimeString()}
    <span class="remain">(残り: 計算中...)</span>
  `;

  document.getElementById("timerList").appendChild(li);

  const remainSpan = li.querySelector(".remain");

  function updateRemain() {
    const now = new Date();
    const diff = target - now;

    if (diff <= 0) {
      clearInterval(interval);
      remainSpan.textContent = "(終了)";

      const note = document.createElement("div");
      note.className = "notify";
      note.textContent = `✅ タイマー${id}【${memo}】：${target.toLocaleTimeString()} になりました！`;

      document.getElementById("notifications").prepend(note);

    } else {
      const sec = Math.floor(diff / 1000);
      remainSpan.textContent = `(残り: ${formatTime(sec)})`;
    }
  }

  updateRemain();
  const interval = setInterval(updateRemain, 1000);
}
</script>

</body>
</html>
