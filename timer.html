<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>簡易複数タイマー</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ヘッダー -->
<div id="header"></div>
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  })
  .catch(err => console.error("ヘッダー読み込み失敗:", err));
</script>

<main>

<h2>簡易複数タイマー</h2>

<!-- 入力エリア -->
<div class="form-row">
  <label>ラベル</label>
  <input type="text" id="memo" placeholder="メモ的に使う欄">
</div>

<div class="form-row">
  <label>時間</label>

  <input type="number" id="hours" value="0" min="0" class="small-input">
  <span>時</span>

  <input type="number" id="minutes" value="0" min="0" class="small-input">
  <span>分</span>

  <input type="number" id="seconds" value="10" min="0" class="small-input">
  <span>秒</span>
</div>

<button onclick="addTimer()">追加</button>

<h3>タイマー一覧</h3>
<ul id="timerList"></ul>

<h3>通知</h3>
<div id="notifications"></div>

</main>

<script>
let timerId = 0;

function addTimer() {
  const memo = document.getElementById("memo").value.trim() || "（ラベルなし）";
  const hours = parseInt(document.getElementById("hours").value, 10) || 0;
  const minutes = parseInt(document.getElementById("minutes").value, 10) || 0;
  const seconds = parseInt(document.getElementById("seconds").value, 10) || 0;

  const totalMs = (hours * 3600 + minutes * 60 + seconds) * 1000;

  if (totalMs <= 0) {
    alert("1秒以上を設定してください");
    return;
  }

  const now = new Date();
  const target = new Date(now.getTime() + totalMs);

  const li = document.createElement("li");
  li.className = "timer-item";
  const id = ++timerId;

  li.innerHTML = `
    タイマー${id}【${memo}】：${hours}時間 ${minutes}分 ${seconds}秒後 → ${target.toLocaleTimeString()}
    <span class="remain">(残り: 計算中...)</span>
  `;

  document.getElementById("timerList").appendChild(li);

  const remainSpan = li.querySelector(".remain");

  function updateRemain() {
    const now = new Date();
    const diff = target - now;

    if (diff <= 0) {
      clearInterval(interval);
      remainSpan.textContent = "(終了)";

      const note = document.createElement("div");
      note.className = "notify";
      note.textContent = `✅ タイマー${id}【${memo}】：${target.toLocaleTimeString()} になりました！`;

      document.getElementById("notifications").prepend(note);

    } else {
      const sec = Math.floor(diff / 1000);
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;

      let remainText = "";
      if (h > 0) {
        remainText = `${h}時間${m}分${s}秒`;
      } else if (m > 0) {
        remainText = `${m}分${s}秒`;
      } else {
        remainText = `${s}秒`;
      }

      remainSpan.textContent = `(残り: ${remainText})`;
    }
  }

  updateRemain();
  const interval = setInterval(updateRemain, 1000);
}
</script>

</body>
</html>
