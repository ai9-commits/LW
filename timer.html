<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DOUGU | Timer</title>

<link rel="stylesheet" href="style.css">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NWV2W1CSQT"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-NWV2W1CSQT');
</script>
</head>

<body>

<!-- header -->
<div id="header"></div>

<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  })
  .catch(err => console.error("ヘッダー読み込み失敗:", err));
</script>

<main>

  <h1>Timer</h1>

  <p class="page-description">
    複数のカウントダウンタイマーや指定時刻タイマーを同時に管理できます。
  </p>


  <!-- Timer settings -->
  <section class="tool-section">

    <!-- Label -->
    <div class="form-row compact-row">

      <label class="label-option emoji-option">
        <input type="radio" name="labelType" value="🎁" checked>
        <span>🎁</span>
      </label>

      <label class="label-option emoji-option">
        <input type="radio" name="labelType" value="📘">
        <span>📘</span>
      </label>

      <label class="label-option emoji-option">
        <input type="radio" name="labelType" value="⚔️">
        <span>⚔️</span>
      </label>

      <label class="label-option emoji-option">
        <input type="radio" name="labelType" value="🍙">
        <span>🍙</span>
      </label>

      <label class="label-option emoji-option">
        <input type="radio" name="labelType" value="🦑">
        <span>🦑</span>
      </label>

      <label class="label-option emoji-option">
        <input type="radio" name="labelType" value="🛸">
        <span>🛸</span>
      </label>

      <label class="label-option text-option">
        <input type="radio" name="labelType" value="text">
        <span></span>
      </label>

      <input
        type="text"
        id="memoText"
        class="memo-mini"
        maxlength="5"
        placeholder="memo">

    </div>


    <!-- Mode and time -->
    <div class="form-row compact-row">

      <label>
        <input type="radio" name="mode" value="duration" checked>
        残り
      </label>

      <label>
        <input type="radio" name="mode" value="target">
        時刻
      </label>

      <input
        type="text"
        id="timeInput"
        placeholder="15:30 / 1530 / 00:15:30"
        inputmode="numeric"
        class="time-input">

    </div>


    <!-- Sound -->
    <div class="form-row compact-row">

      <button
        type="button"
        class="mini-button icon-button"
        id="testSoundBtn"
        title="試聴">
        ▶
      </button>


      <div class="volume-group">

        <label>
          <input type="radio" name="volume" value="0">
          🔇
        </label>

        <label>
          <input type="radio" name="volume" value="0.08">
          🔈
        </label>

        <label>
          <input type="radio" name="volume" value="0.18" checked>
          🔉
        </label>

        <label>
          <input type="radio" name="volume" value="0.42">
          🔊
        </label>

      </div>

    </div>


    <!-- Add timer -->
    <div class="form-row add-row">

      <button
        class="btn-primary add-timer-button"
        onclick="addTimer()">
        タイマー追加
      </button>

    </div>

  </section>



  <!-- Active timers -->
  <section class="tool-section">

    <div class="section-header">

      <h2>Timers</h2>

      <button
        class="clear-button"
        id="clearAllBtn">
        All clear
      </button>

    </div>


    <ul id="timerList"></ul>

  </section>



  <!-- Completed timers -->
  <section class="tool-section">

    <h2
      id="finishedToggle"
      class="toggle-heading">
      Completed（0件）▼
    </h2>


    <ul
      id="finishedList"
      style="display:none;">
    </ul>

  </section>


</main>
  
<script>
let timerId = 0;
let timers = [];
let finishedOpen = false;

/* =========================
   音声
========================= */
let audioCtx = null;

function initAudio() {

  try {

    const AC =
      window.AudioContext ||
      window.webkitAudioContext;

    if (!audioCtx) {
      audioCtx = new AC();
    }

    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }

  } catch(e) {

    console.log("audio unavailable");
  }
}

function getVolumeLevel() {

  const selected =
    document.querySelector(
      'input[name="volume"]:checked'
    );

  return selected
    ? Number(selected.value)
    : 0.05;
}

function beepAt(startTime) {

  if (!audioCtx) return;

  const volume = getVolumeLevel();

  if (volume <= 0) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = 880;

  gain.gain.setValueAtTime(0.001, startTime);

  gain.gain.exponentialRampToValueAtTime(
    volume,
    startTime + 0.01
  );

  gain.gain.exponentialRampToValueAtTime(
    0.001,
    startTime + 0.14
  );

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(startTime);
  osc.stop(startTime + 0.15);
}

function playBeepTwice() {

  if (!audioCtx) return;

  const now = audioCtx.currentTime;

  beepAt(now);
  beepAt(now + 0.18);
}

/* =========================
   要素
========================= */
const timeInput =
  document.getElementById("timeInput");

const testSoundBtn =
  document.getElementById("testSoundBtn");

const memoText =
  document.getElementById("memoText");

/* =========================
   ラベルUI
========================= */
function updateLabelUI() {

  const selected =
    document.querySelector(
      'input[name="labelType"]:checked'
    );

  const isText =
    selected.value === "text";

  memoText.disabled = !isText;

  if (!isText) {
    memoText.value = "";
  }
}

/* =========================
   試聴ボタン
========================= */
function updateTestButtonState() {

  const muted =
    getVolumeLevel() === 0;

  testSoundBtn.disabled = muted;

  testSoundBtn.title =
    muted ? "ミュート中" : "試聴";
}

/* =========================
   音量保存
========================= */
function saveVolumeSetting() {

  const selected =
    document.querySelector(
      'input[name="volume"]:checked'
    );

  if (!selected) return;

  localStorage.setItem(
    "timer_volume",
    selected.value
  );
}

function loadVolumeSetting() {

  const saved =
    localStorage.getItem("timer_volume");

  if (!saved) return;

  const target =
    document.querySelector(
      `input[name="volume"][value="${saved}"]`
    );

  if (target) {
    target.checked = true;
  }
}

document
  .querySelectorAll('input[name="volume"]')
  .forEach(radio => {

    radio.addEventListener("change", () => {

      saveVolumeSetting();
      updateTestButtonState();

    });

});

document
  .querySelectorAll('input[name="labelType"]')
  .forEach(radio => {

    radio.addEventListener(
      "change",
      updateLabelUI
    );

});

/* 試聴 */
testSoundBtn.addEventListener("click", () => {

  initAudio();
  playBeepTwice();

  if (typeof gtag === "function") {
    gtag("event", "timer_sound_test");
  }
});

/* =========================
   時間パース
========================= */
function parseTimeFlexible(input) {

  if (!input) return null;

  input = input.trim();

  if (input.includes(":")) {

    const p =
      input.split(":").map(Number);

    if (p.length === 3) {
      return p[0] * 3600
           + p[1] * 60
           + p[2];
    }

    if (p.length === 2) {
      return p[0] * 60 + p[1];
    }

    return null;
  }

  if (!/^\d+$/.test(input)) {
    return null;
  }

  const str =
    input.padStart(6, "0");

  const h =
    Number(str.slice(0, -4)) || 0;

  const m =
    Number(str.slice(-4, -2));

  const s =
    Number(str.slice(-2));

  if (m >= 60 || s >= 60) {
    return null;
  }

  return h * 3600 + m * 60 + s;
}

/* =========================
   指定時刻
========================= */
function parseTargetTime(input) {

  if (!input) return null;

  input = input.trim();

  let h = 0;
  let m = 0;
  let s = 0;

  if (input.includes(":")) {

    const p =
      input.split(":").map(Number);

    if (p.length === 2) {

      h = p[0];
      m = p[1];

    } else if (p.length === 3) {

      h = p[0];
      m = p[1];
      s = p[2];

    } else {

      return null;
    }

  } else {

    if (!/^\d+$/.test(input)) {
      return null;
    }

    const str =
      input.padStart(6, "0");

    h = Number(str.slice(0, -4)) || 0;
    m = Number(str.slice(-4, -2));
    s = Number(str.slice(-2));
  }

  if (h > 23 || m > 59 || s > 59) {
    return null;
  }

  const now = new Date();

  const target = new Date();

  target.setHours(h, m, s, 0);

  if (target.getTime() <= now.getTime()) {
    target.setDate(target.getDate() + 1);
  }

  return target.getTime();
}

/* =========================
   共通
========================= */
function formatTime(sec) {

  const h =
    Math.floor(sec / 3600);

  const m =
    Math.floor((sec % 3600) / 60);

  const s =
    sec % 60;

  return String(h).padStart(2, "0")
    + ":"
    + String(m).padStart(2, "0")
    + ":"
    + String(s).padStart(2, "0");
}

function getMode() {

  return document.querySelector(
    'input[name="mode"]:checked'
  ).value;
}

function formatTimerId(id) {

  return String(id).padStart(2, "0");
}

/* =========================
   Enter追加
========================= */
timeInput.addEventListener(
  "keydown",
  (e) => {

    if (
      e.key === "Enter" &&
      !e.isComposing
    ) {

      e.preventDefault();
      addTimer();
    }
});

/* =========================
   モードUI
========================= */
function updateModeUI() {

  const mode = getMode();

  if (mode === "duration") {

    timeInput.placeholder =
      "15:30 / 1530 / 00:15:30";

  } else {

    timeInput.placeholder =
      "183015 / 18:30:15";
  }

  timeInput.value = "";
}

document
  .querySelectorAll('input[name="mode"]')
  .forEach(r => {

    r.addEventListener(
      "change",
      updateModeUI
    );

});

/* blur整形 */
timeInput.addEventListener("blur", () => {

  if (getMode() !== "duration") {
    return;
  }

  const sec =
    parseTimeFlexible(timeInput.value);

  if (sec !== null) {
    timeInput.value = formatTime(sec);
  }
});

/* =========================
   保存
========================= */
function saveTimers() {

  const saveData =
    timers.map(t => ({
      id: t.id,
      labelType: t.labelType,
      labelText: t.labelText,
      target: t.target,
      completed: t.completed,
      endGraceUntil: t.endGraceUntil
    }));

  localStorage.setItem(
    "timers_v2",
    JSON.stringify(saveData)
  );
}

function loadTimers() {

  const data =
    localStorage.getItem("timers_v2");

  if (!data) return;

  const loaded =
    JSON.parse(data);

  const now = Date.now();

  timers = loaded
    .filter(t =>
      now <= t.target + 5 * 60 * 1000 &&
      t.completed !== true
    )
    .map(t => ({
      ...t,
      interval: null
    }));

  timerId =
    timers.reduce(
      (max, t) =>
        Math.max(max, t.id),
      0
    );
}

/* =========================
   追加
========================= */
function addTimer() {

  initAudio();

  const selectedLabel =
    document.querySelector(
      'input[name="labelType"]:checked'
    );

  const labelType =
    selectedLabel.value === "text"
      ? "text"
      : "emoji";

  let labelText = "";

  if (labelType === "text") {

    labelText =
      memoText.value.trim() || "memo";

  } else {

    labelText = selectedLabel.value;
  }

  const input =
    timeInput.value.trim();

  const mode = getMode();

  let target;
  let secForLog = 0;

  if (mode === "duration") {

    const sec =
      parseTimeFlexible(input);

    if (!sec || sec <= 0) {

      alert("時間形式が不正です");
      return;
    }

    target =
      Date.now() + sec * 1000;

    secForLog = sec;

  } else {

    target =
      parseTargetTime(input);

    if (!target) {

      alert("時刻形式が不正です");
      return;
    }

    secForLog =
      Math.floor(
        (target - Date.now()) / 1000
      );
  }

  if (typeof gtag === "function") {

    gtag("event", "timer_add", {
      mode: mode,
      seconds: secForLog
    });
  }

  timers.push({
    id: ++timerId,
    labelType,
    labelText,
    target,
    interval: null,
    endGraceUntil: null,
    completed: false
  });

  saveTimers();
  renderTimers();

  timeInput.value = "";
  timeInput.focus();
}

/* =========================
   削除
========================= */
function removeTimer(id) {

  if (typeof gtag === "function") {
    gtag("event", "timer_remove");
  }

  const i =
    timers.findIndex(
      t => t.id === id
    );

  if (i === -1) return;

  if (timers[i].interval) {
    clearInterval(timers[i].interval);
  }

  timers.splice(i, 1);

  saveTimers();
  renderTimers();
}

/* =========================
   オールクリア
========================= */
document
  .getElementById("clearAllBtn")
  .addEventListener("click", () => {

    if (
      !confirm(
        "保存済みタイマーをすべて削除しますか？"
      )
    ) {
      return;
    }

    timers.forEach(t => {

      if (t.interval) {
        clearInterval(t.interval);
      }

    });

    timers = [];
    timerId = 0;

    localStorage.removeItem("timers_v2");

    renderTimers();
});

/* =========================
   完了開閉
========================= */
document
  .getElementById("finishedToggle")
  .onclick = () => {

  finishedOpen = !finishedOpen;

  document.getElementById(
    "finishedList"
  ).style.display =
    finishedOpen
      ? "block"
      : "none";

  document.getElementById(
    "finishedToggle"
  ).textContent =
    `完了（${document.getElementById("finishedList").children.length}件）`
    + (finishedOpen ? "▲" : "▼");
};

/* =========================
   描画
========================= */
function renderTimers() {

  timers.forEach(t => {

    if (t.interval) {

      clearInterval(t.interval);
      t.interval = null;
    }
  });

  const now = Date.now();

  const active = [];
  const finished = [];

  timers.forEach(t => {

    if (now <= t.target) {

      active.push(t);

    } else {

      if (!t.endGraceUntil) {
        t.endGraceUntil =
          t.target + 5 * 60 * 1000;
      }

      if (now <= t.endGraceUntil) {

        active.push(t);

      } else {

        finished.push(t);
      }
    }
  });

  active.sort(
    (a, b) => a.target - b.target
  );

  finished.sort(
    (a, b) => b.target - a.target
  );

  drawList("timerList", active);
  drawList("finishedList", finished);

  document.getElementById(
    "finishedToggle"
  ).textContent =
    `完了（${finished.length}件）`
    + (finishedOpen ? "▲" : "▼");

  saveTimers();
}

/* =========================
   リスト描画
========================= */
function drawList(id, list) {

  const ul =
    document.getElementById(id);

  ul.innerHTML = "";

  list.forEach(t => {

    const li =
      document.createElement("li");

    li.className =
      "timer-item compact-timer-item";

    const labelDisplay =
      t.labelType === "text"
        ? `【${t.labelText}】`
        : t.labelText;

    li.innerHTML = `
      <span class="timer-label">
        #${formatTimerId(t.id)} ${labelDisplay}
      </span>

      <span class="timer-target">
        ${new Date(t.target).toLocaleTimeString()}
      </span>

      <span class="remain">
        (残り: 計算中...)
      </span>

      <button
        class="mini-button icon-button"
        title="削除"
        onclick="removeTimer(${t.id})">

        🗑

      </button>
    `;

    ul.appendChild(li);

    const remain =
      li.querySelector(".remain");

    function update() {

      const diff =
        t.target - Date.now();

      if (diff <= 0) {

        clearInterval(t.interval);

        t.interval = null;

        remain.textContent =
          "(終了)";

        if (t.completed !== true) {

          t.completed = true;

          saveTimers();

          if (getVolumeLevel() > 0) {
            playBeepTwice();
          }

          if (typeof gtag === "function") {
            gtag("event", "timer_complete");
          }
        }

        return;
      }

      remain.textContent =
        "(残り: "
        + formatTime(
            Math.floor(diff / 1000)
          )
        + ")";
    }

    update();

    t.interval =
      setInterval(update, 1000);
  });
}

/* =========================
   初期化
========================= */
loadTimers();

loadVolumeSetting();

updateModeUI();

updateLabelUI();

updateTestButtonState();

renderTimers();

setInterval(renderTimers, 10000);
</script>

<!-- footer -->
<div id="footer"></div>

<script>
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>

</body>
</html>
