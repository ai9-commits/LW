<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイマー</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="header"></div>

<h2>タイマー</h2>

<div class="form-row">
  <label for="timeInput">時間</label>
  <input
    type="text"
    id="timeInput"
    placeholder="例: 5:30 / 530 / 00:05:30"
    inputmode="numeric"
  >
</div>

<div class="form-row">
  <label for="labelInput">ラベル</label>
  <input type="text" id="labelInput" placeholder="任意">
</div>

<button onclick="addTimer()">タイマー追加</button>

<div id="timerList"></div>

<script>
/* =========================
   header読み込み（既存維持）
========================= */
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });

/* =========================
   時間パース（新規）
========================= */
function parseTimeFlexible(input) {
  if (!input) return null;

  input = input.trim();

  // コロンあり
  if (input.includes(':')) {
    const parts = input.split(':').map(Number);

    if (parts.length === 3) {
      return parts[0]*3600 + parts[1]*60 + parts[2];
    }
    if (parts.length === 2) {
      return parts[0]*60 + parts[1];
    }
    return null;
  }

  // 数字のみ
  if (!/^\d+$/.test(input)) return null;

  const str = input.padStart(6, '0');

  const h = Number(str.slice(0, -4)) || 0;
  const m = Number(str.slice(-4, -2));
  const s = Number(str.slice(-2));

  if (m >= 60 || s >= 60) return null;

  return h*3600 + m*60 + s;
}

/* =========================
   フォーマット（新規）
========================= */
function formatTime(h, m, s) {
  return String(h).padStart(2,'0') + ":" +
         String(m).padStart(2,'0') + ":" +
         String(s).padStart(2,'0');
}

/* =========================
   入力整形（blur時）
========================= */
const timeInput = document.getElementById("timeInput");

timeInput.addEventListener("blur", () => {
  const sec = parseTimeFlexible(timeInput.value);
  if (sec === null) return;

  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;

  timeInput.value = formatTime(h, m, s);
});

/* =========================
   タイマー処理（既存ベース）
========================= */
function addTimer() {
  const input = document.getElementById("timeInput").value;
  const label = document.getElementById("labelInput").value;

  const totalSeconds = parseTimeFlexible(input);

  if (totalSeconds === null || totalSeconds <= 0) {
    alert("時間形式が不正です");
    return;
  }

  const endTime = Date.now() + totalSeconds * 1000;

  const item = document.createElement("div");
  item.className = "timer-item";

  const labelSpan = document.createElement("span");
  labelSpan.textContent = label ? label + " " : "";

  const remainSpan = document.createElement("span");
  remainSpan.className = "remain";

  item.appendChild(labelSpan);
  item.appendChild(remainSpan);

  document.getElementById("timerList").appendChild(item);

  function update() {
    const diff = Math.floor((endTime - Date.now()) / 1000);

    if (diff <= 0) {
      remainSpan.textContent = "終了";
      item.classList.add("notify");
      return;
    }

    const h = Math.floor(diff / 3600);
    const m = Math.floor((diff % 3600) / 60);
    const s = diff % 60;

    remainSpan.textContent = formatTime(h, m, s);

    requestAnimationFrame(update);
  }

  update();
}
</script>

</body>
</html>
