<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>簡易複数タイマー</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="header"></div>
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => document.getElementById("header").innerHTML = data);
</script>

<main>

<h2>簡易複数タイマー</h2>

<div id="timerList"></div>

<div class="form-row">
  <input type="number" id="minutes" placeholder="分" class="small-input">
  <input type="number" id="seconds" placeholder="秒" class="small-input">
  <button onclick="addTimer()">追加</button>
</div>

</main>

<script>
let timers = [];

function addTimer(){
  const m = parseInt(document.getElementById("minutes").value) || 0;
  const s = parseInt(document.getElementById("seconds").value) || 0;
  const total = m*60 + s;
  if(total <= 0) return;

  const end = Date.now() + total*1000;
  timers.push({end});

  render();
}

function render(){
  const list = document.getElementById("timerList");
  list.innerHTML = "";

  timers.forEach((t,i)=>{
    const remain = Math.max(0, Math.floor((t.end - Date.now())/1000));

    const div = document.createElement("div");
    div.className = "timer-item";
    div.innerHTML = `
      タイマー${i+1}：
      <span class="remain">${remain}秒</span>
    `;
    list.appendChild(div);
  });
}

setInterval(render, 1000);
</script>

</body>
</html>
