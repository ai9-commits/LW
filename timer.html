<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>簡易複数タイマー</title>
<link rel="stylesheet" href="style.css">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NWV2W1CSQT"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-NWV2W1CSQT');
</script>
</head>

<body>

<!-- header -->
<div id="header"></div>
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  })
  .catch(err => console.error("ヘッダー読み込み失敗:", err));
</script>

<main>

<h2>簡易複数タイマー</h2>

<!-- ラベル -->
<div class="form-row">
  <label for="memo">ラベル</label>
  <input type="text" id="memo" placeholder="メモ的に使う欄">
</div>

<!-- モード -->
<div class="form-row">
  <label><input type="radio" name="mode" value="duration" checked> 残り時間</label>
  <label><input type="radio" name="mode" value="target"> 指定時刻</label>
</div>

<!-- 時間入力 -->
<div class="form-row">
  <label for="timeInput">時間</label>
  <input
    type="text"
    id="timeInput"
    placeholder="例: 5:30 / 530 / 00:05:30"
    inputmode="numeric">
</div>

<!-- 音設定 -->
<div class="form-row">
  <label>
    <input type="checkbox" id="soundEnabled" checked>
    音を鳴らす
  </label>

  <button
    type="button"
    class="btn-secondary"
    id="testSoundBtn">
    試聴
  </button>
</div>

<button class="btn-primary" onclick="addTimer()">追加</button>

<h3>タイマー一覧</h3>
<ul id="timerList"></ul>

<h3 id="finishedToggle" style="cursor:pointer;">
完了（0件）▼
</h3>
<ul id="finishedList" style="display:none;"></ul>

</main>

<script>
let timerId = 0;
let timers = [];
let finishedOpen = false;

/* =========================
   音声（iPhone対策込み）
========================= */
let audioCtx = null;

function initAudio() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;

    if (!audioCtx) {
      audioCtx = new AC();
    }

    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }

  } catch(e) {
    console.log("audio unavailable");
  }
}

function beepAt(startTime) {
  if (!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = 880;

  gain.gain.setValueAtTime(0.001, startTime);
  gain.gain.exponentialRampToValueAtTime(0.03, startTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.14);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(startTime);
  osc.stop(startTime + 0.15);
}

function playBeepTwice() {
  if (!audioCtx) return;

  const now = audioCtx.currentTime;
  beepAt(now);
  beepAt(now + 0.25);
}

/* =========================
   要素取得
========================= */
const timeInput = document.getElementById("timeInput");
const soundEnabled = document.getElementById("soundEnabled");
const testSoundBtn = document.getElementById("testSoundBtn");

/* 試聴 */
testSoundBtn.addEventListener("click", () => {
  initAudio();
  playBeepTwice();

  if (typeof gtag === "function") {
    gtag("event", "timer_sound_test");
  }
});

/* =========================
   時間パース（残り時間）
========================= */
function parseTimeFlexible(input) {
  if (!input) return null;

  input = input.trim();

  if (input.includes(":")) {
    const p = input.split(":").map(Number);

    if (p.length === 3) return p[0] * 3600 + p[1] * 60 + p[2];
    if (p.length === 2) return p[0] * 60 + p[1];

    return null;
  }

  if (!/^\d+$/.test(input)) return null;

  const str = input.padStart(6, "0");

  const h = Number(str.slice(0, -4)) || 0;
  const m = Number(str.slice(-4, -2));
  const s = Number(str.slice(-2));

  if (m >= 60 || s >= 60) return null;

  return h * 3600 + m * 60 + s;
}

/* =========================
   指定時刻パース
========================= */
function parseTargetTime(input) {
  if (!input) return null;

  input = input.trim();

  let h = 0;
  let m = 0;
  let s = 0;

  if (input.includes(":")) {
    const p = input.split(":").map(Number);

    if (p.length === 2) {
      h = p[0];
      m = p[1];
    } else if (p.length === 3) {
      h = p[0];
      m = p[1];
      s = p[2];
    } else {
      return null;
    }

  } else {

    if (!/^\d+$/.test(input)) return null;

    const str = input.padStart(6, "0");

    h = Number(str.slice(0, -4)) || 0;
    m = Number(str.slice(-4, -2));
    s = Number(str.slice(-2));
  }

  if (h > 23 || m > 59 || s > 59) return null;

  const now = new Date();

  const target = new Date();
  target.setHours(h, m, s, 0);

  if (target.getTime() <= now.getTime()) {
    target.setDate(target.getDate() + 1);
  }

  return target.getTime();
}

/* =========================
   共通
========================= */
function formatTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;

  return String(h).padStart(2, "0") + ":" +
         String(m).padStart(2, "0") + ":" +
         String(s).padStart(2, "0");
}

function getMode() {
  return document.querySelector('input[name="mode"]:checked').value;
}

/* Enter追加 */
timeInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.isComposing) {
    e.preventDefault();
    addTimer();
  }
});

/* =========================
   UI更新
========================= */
function updateModeUI() {
  const mode = getMode();

  if (mode === "duration") {
    timeInput.placeholder = "例: 5:30 / 530 / 00:05:30";
  } else {
    timeInput.placeholder = "例: 18:30 / 1830 / 18:30:15";
  }

  timeInput.value = "";
}

document.querySelectorAll('input[name="mode"]').forEach(r => {
  r.addEventListener("change", updateModeUI);
});

/* 入力整形 */
timeInput.addEventListener("blur", () => {
  if (getMode() !== "duration") return;

  const sec = parseTimeFlexible(timeInput.value);

  if (sec !== null) {
    timeInput.value = formatTime(sec);
  }
});

/* =========================
   保存
========================= */
function saveTimers() {
  localStorage.setItem("timers", JSON.stringify(timers));
}

function loadTimers() {
  const data = localStorage.getItem("timers");
  if (!data) return;

  timers = JSON.parse(data);

  timers.forEach(t => {
    t.interval = null;
    if (t.completed === undefined) t.completed = false;
  });

  timerId = timers.reduce((max, t) => Math.max(max, t.id), 0);
}

function loadSoundSetting() {
  const v = localStorage.getItem("timer_sound");

  if (v !== null) {
    soundEnabled.checked = (v === "1");
  }
}

soundEnabled.addEventListener("change", () => {
  localStorage.setItem(
    "timer_sound",
    soundEnabled.checked ? "1" : "0"
  );
});

/* =========================
   追加
========================= */
function addTimer() {

  initAudio();

  const memo =
    document.getElementById("memo").value.trim() || "（ラベルなし）";

  const input = timeInput.value.trim();
  const mode = getMode();

  let target;
  let secForLog = 0;

  if (mode === "duration") {

    const sec = parseTimeFlexible(input);

    if (!sec || sec <= 0) {
      alert("時間形式が不正です");
      return;
    }

    target = Date.now() + sec * 1000;
    secForLog = sec;

  } else {

    target = parseTargetTime(input);

    if (!target) {
      alert("時刻形式が不正です");
      return;
    }

    secForLog = Math.floor((target - Date.now()) / 1000);
  }

  if (typeof gtag === "function") {
    gtag("event", "timer_add", {
      mode: mode,
      seconds: secForLog
    });
  }

  timers.push({
    id: ++timerId,
    memo,
    target,
    interval: null,
    endGraceUntil: null,
    completed: false
  });

  saveTimers();
  renderTimers();

  timeInput.value = "";
  timeInput.focus();
}

/* =========================
   削除
========================= */
function removeTimer(id) {

  if (typeof gtag === "function") {
    gtag("event", "timer_remove");
  }

  const i = timers.findIndex(t => t.id === id);
  if (i === -1) return;

  if (timers[i].interval) {
    clearInterval(timers[i].interval);
  }

  timers.splice(i, 1);

  saveTimers();
  renderTimers();
}

/* =========================
   完了開閉
========================= */
document.getElementById("finishedToggle").onclick = () => {
  finishedOpen = !finishedOpen;

  document.getElementById("finishedList").style.display =
    finishedOpen ? "block" : "none";

  document.getElementById("finishedToggle").textContent =
    `完了（${document.getElementById("finishedList").children.length}件）`
    + (finishedOpen ? "▲" : "▼");
};

/* =========================
   描画
========================= */
function renderTimers() {

  timers.forEach(t => {
    if (t.interval) {
      clearInterval(t.interval);
      t.interval = null;
    }
  });

  const now = Date.now();
  const active = [];
  const finished = [];

  timers.forEach(t => {

    if (now <= t.target) {

      active.push(t);

    } else {

      if (!t.endGraceUntil) {
        t.endGraceUntil = t.target + 5 * 60 * 1000;
      }

      if (now <= t.endGraceUntil) {
        active.push(t);
      } else {
        finished.push(t);
      }
    }
  });

  active.sort((a, b) => a.target - b.target);
  finished.sort((a, b) => b.target - a.target);

  drawList("timerList", active);
  drawList("finishedList", finished);

  document.getElementById("finishedToggle").textContent =
    `完了（${finished.length}件）`
    + (finishedOpen ? "▲" : "▼");

  saveTimers();
}

/* =========================
   リスト描画
========================= */
function drawList(id, list) {

  const ul = document.getElementById(id);
  ul.innerHTML = "";

  list.forEach(t => {

    const li = document.createElement("li");
    li.className = "timer-item";

    li.innerHTML = `
      timer${t.id}【${t.memo}】 →
      ${new Date(t.target).toLocaleTimeString()}
      <span class="remain">(残り: 計算中...)</span>
      <button class="btn-danger" onclick="removeTimer(${t.id})">削除</button>
    `;

    ul.appendChild(li);

    const remain = li.querySelector(".remain");

    function update() {

      const diff = t.target - Date.now();

      if (diff <= 0) {

        clearInterval(t.interval);
        t.interval = null;

        remain.textContent = "(終了)";

        if (!t.completed) {
          t.completed = true;

          if (soundEnabled.checked) {
            playBeepTwice();
          }

          if (typeof gtag === "function") {
            gtag("event", "timer_complete");
          }

          saveTimers();
        }

      } else {

        remain.textContent =
          "(残り: " + formatTime(Math.floor(diff / 1000)) + ")";
      }
    }

    update();
    t.interval = setInterval(update, 1000);
  });
}

/* =========================
   初期化
========================= */
loadTimers();
loadSoundSetting();
updateModeUI();
renderTimers();

setInterval(renderTimers, 10000);
</script>

<!-- footer -->
<div id="footer"></div>
<script>
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>
</body>
</html>
